<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Terra / Land-Use & GHG Analysis</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:            #0d1410;
    --bg-raised:     #141c16;
    --bg-sunken:     #080c09;
    --ink:           #ecdfc8;
    --ink-dim:       #9ea394;
    --ink-faint:     #5a6158;
    --accent:        #d4742a;
    --accent-dim:    #8f4f1f;
    --ok:            #6fa25a;
    --warn:          #d4a72a;
    --err:           #c45a45;
    --rule:          #26302a;

    /* Palette copied byte-for-byte from backend/inference.py PALETTE dict.
       Reusing it keeps the overlay mask and the composition bar visually coherent. */
    --cls-no_data:      rgb(0,   0,   0);
    --cls-background:   rgb(210, 210, 210);
    --cls-building:     rgb(220, 20,  60);
    --cls-road:         rgb(70,  70,  70);
    --cls-water:        rgb(30,  144, 255);
    --cls-barren:       rgb(210, 180, 140);
    --cls-forest:       rgb(34,  139, 34);
    --cls-agriculture:  rgb(255, 215, 0);

    --mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
    --serif: "Fraunces", "Iowan Old Style", Georgia, serif;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--mono);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
    /* subtle vignette so the bg isn't a flat slab */
    background-image:
      radial-gradient(ellipse at top, #162018 0%, var(--bg) 60%),
      repeating-linear-gradient(
        0deg,
        transparent 0px, transparent 3px,
        rgba(255,255,255,0.008) 3px, rgba(255,255,255,0.008) 4px
      );
  }

  /* ---------- top status bar (the "instrument chrome") ---------- */
  header.chrome {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 24px;
    align-items: center;
    padding: 14px 28px;
    border-bottom: 1px solid var(--rule);
    background: var(--bg-sunken);
  }
  .brand {
    display: flex;
    align-items: baseline;
    gap: 12px;
  }
  .brand .logo {
    font-family: var(--serif);
    font-weight: 500;
    font-size: 22px;
    letter-spacing: -0.02em;
  }
  .brand .tag {
    color: var(--ink-faint);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
  }
  .status {
    display: flex;
    gap: 20px;
    justify-self: end;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
  }
  .status .pill {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--ink-dim);
  }
  .status .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--ink-faint);
    box-shadow: 0 0 0 0 transparent;
    transition: background 200ms, box-shadow 200ms;
  }
  .status .dot.ok   { background: var(--ok);   box-shadow: 0 0 8px var(--ok); }
  .status .dot.warn { background: var(--warn); box-shadow: 0 0 8px var(--warn); }
  .status .dot.err  { background: var(--err);  box-shadow: 0 0 8px var(--err); }

  /* ---------- main grid ---------- */
  main {
    display: grid;
    grid-template-columns: minmax(360px, 480px) 1fr;
    gap: 40px;
    padding: 32px 28px;
    max-width: 1400px;
    margin: 0 auto;
  }
  @media (max-width: 900px) {
    main { grid-template-columns: 1fr; padding: 20px 16px; gap: 28px; }
  }

  /* ---------- panel base style ---------- */
  .panel {
    background: var(--bg-raised);
    border: 1px solid var(--rule);
    border-radius: 2px;
  }
  .panel-title {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid var(--rule);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--ink-dim);
  }
  .panel-title .idx {
    font-family: var(--mono);
    color: var(--ink-faint);
  }
  .panel-body { padding: 16px; }

  /* ---------- upload panel ---------- */
  .drop {
    display: block;
    border: 1px dashed var(--rule);
    border-radius: 2px;
    padding: 28px 16px;
    text-align: center;
    color: var(--ink-dim);
    cursor: pointer;
    transition: border-color 200ms, background 200ms, color 200ms;
  }
  .drop:hover, .drop.hot {
    border-color: var(--accent);
    background: rgba(212, 116, 42, 0.04);
    color: var(--ink);
  }
  .drop .big {
    font-family: var(--serif);
    font-size: 18px;
    font-weight: 500;
    color: var(--ink);
    display: block;
    margin-bottom: 6px;
  }
  .drop .small { font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; }
  input[type="file"] { display: none; }

  .demos {
    display: flex;
    gap: 8px;
    margin-top: 14px;
    flex-wrap: wrap;
  }
  .demos .demo {
    flex: 1 1 auto;
    padding: 8px 12px;
    background: transparent;
    color: var(--ink-dim);
    border: 1px solid var(--rule);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 150ms;
  }
  .demos .demo:hover {
    border-color: var(--accent);
    color: var(--ink);
  }

  /* ---------- image preview + mask ---------- */
  .imgs {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .imgs figure {
    margin: 0;
  }
  .imgs figcaption {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-faint);
    padding-bottom: 6px;
  }
  .imgs .frame {
    background: var(--bg-sunken);
    border: 1px solid var(--rule);
    aspect-ratio: 1 / 1;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .imgs img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .imgs .empty {
    color: var(--ink-faint);
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  /* ---------- composition bar ---------- */
  .comp-bar {
    display: flex;
    height: 18px;
    border: 1px solid var(--rule);
    background: var(--bg-sunken);
    overflow: hidden;
    margin-bottom: 12px;
  }
  .comp-bar .seg {
    height: 100%;
    min-width: 0;
    transition: flex-basis 400ms cubic-bezier(.2,.8,.2,1);
  }
  .legend {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px 14px;
  }
  .legend .row {
    display: grid;
    grid-template-columns: 10px 1fr auto;
    align-items: center;
    gap: 8px;
    font-size: 12px;
  }
  .legend .swatch {
    width: 10px;
    height: 10px;
    border: 1px solid rgba(0,0,0,0.3);
  }
  .legend .name { color: var(--ink-dim); }
  .legend .pct { font-variant-numeric: tabular-nums; color: var(--ink); }

  /* ---------- totals card ---------- */
  .totals {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--rule);
    margin-top: 14px;
    border: 1px solid var(--rule);
  }
  .totals .kv {
    background: var(--bg-raised);
    padding: 12px 14px;
  }
  .totals .k {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 4px;
  }
  .totals .v {
    font-family: var(--mono);
    font-size: 20px;
    font-weight: 500;
    font-variant-numeric: tabular-nums;
    color: var(--ink);
  }
  .totals .v.pos { color: var(--err); }
  .totals .v.neg { color: var(--ok); }
  .totals .unit { font-size: 11px; color: var(--ink-faint); margin-left: 4px; }

  /* ---------- analyze button ---------- */
  .analyze-row {
    margin-top: 18px;
    display: flex;
    gap: 10px;
    align-items: center;
  }
  button.analyze {
    flex: 1;
    background: var(--accent);
    color: var(--bg-sunken);
    border: none;
    padding: 12px 18px;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 150ms, transform 80ms;
  }
  button.analyze:hover:not(:disabled) { background: #e68138; }
  button.analyze:active:not(:disabled) { transform: translateY(1px); }
  button.analyze:disabled {
    background: var(--rule);
    color: var(--ink-faint);
    cursor: not-allowed;
  }

  /* ---------- report panel ---------- */
  .report-panel {
    min-height: 420px;
    display: flex;
    flex-direction: column;
  }
  .report-empty {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    flex: 1;
    padding: 60px 32px;
    text-align: center;
    color: var(--ink-faint);
  }
  .report-empty .big {
    font-family: var(--serif);
    font-size: 22px;
    color: var(--ink-dim);
    margin-bottom: 10px;
    font-style: italic;
  }
  .report-empty .small {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
  }

  /* progress while the agent runs */
  .progress {
    padding: 32px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .progress .step {
    display: grid;
    grid-template-columns: 32px 1fr auto;
    gap: 12px;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px dashed var(--rule);
    color: var(--ink-dim);
    font-size: 12px;
    opacity: 0;
    animation: fadeIn 300ms forwards;
  }
  .progress .step:last-child { border-bottom: none; }
  .progress .step .num {
    font-family: var(--mono);
    color: var(--ink-faint);
    font-size: 10px;
    letter-spacing: 0.1em;
  }
  .progress .step.active { color: var(--accent); }
  .progress .step.active .spinner {
    display: inline-block;
    width: 10px;
    height: 10px;
    border: 2px solid var(--accent-dim);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 800ms linear infinite;
  }
  .progress .step.done .check {
    color: var(--ok);
    font-family: var(--mono);
  }

  /* rendered final text — the serif column */
  .report-content {
    flex: 1;
    padding: 28px 32px;
    font-family: var(--serif);
    font-size: 15.5px;
    line-height: 1.65;
    color: var(--ink);
    overflow-y: auto;
  }
  .report-content h1,
  .report-content h2,
  .report-content h3 {
    font-weight: 500;
    letter-spacing: -0.01em;
    margin: 1.4em 0 0.4em;
    color: var(--ink);
  }
  .report-content h1 { font-size: 22px; }
  .report-content h2 { font-size: 18px; border-bottom: 1px solid var(--rule); padding-bottom: 6px; }
  .report-content h3 { font-size: 15px; color: var(--ink-dim); }
  .report-content p { margin: 0 0 1em; }
  .report-content hr {
    border: 0;
    border-top: 1px solid var(--rule);
    margin: 1.2em 0;
  }
  .report-content strong { color: var(--ink); font-weight: 600; }
  .report-content em { color: var(--ink-dim); }
  .report-content ul, .report-content ol { padding-left: 1.4em; }
  .report-content li { margin-bottom: 0.3em; }
  .report-content .src {
    display: inline-block;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.08em;
    padding: 1px 6px;
    margin: 0 1px;
    background: rgba(212, 116, 42, 0.14);
    color: var(--accent);
    border-radius: 2px;
    vertical-align: 1px;
  }

  /* tool-call trace + meta footer */
  .report-meta {
    border-top: 1px solid var(--rule);
    padding: 14px 32px;
    background: var(--bg-sunken);
    font-size: 11px;
    color: var(--ink-faint);
    display: grid;
    gap: 12px;
  }
  .report-meta .row { display: flex; gap: 18px; flex-wrap: wrap; }
  .report-meta .label {
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--ink-faint);
  }
  .report-meta .val { color: var(--ink-dim); font-variant-numeric: tabular-nums; }
  .report-meta .tool {
    display: inline-block;
    padding: 2px 8px;
    margin: 2px 4px 2px 0;
    background: var(--bg-raised);
    border: 1px solid var(--rule);
    color: var(--ink-dim);
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    opacity: 0;
    animation: fadeIn 300ms forwards;
  }
  .report-meta .tool.err { border-color: var(--err); color: var(--err); }
  .report-meta .sources {
    display: grid;
    gap: 4px;
    font-family: var(--mono);
    font-size: 10.5px;
    color: var(--ink-faint);
  }
  .report-meta .sources .src-line { display: flex; gap: 10px; }
  .report-meta .sources .src-key { color: var(--accent); flex-shrink: 0; }

  /* warnings inline */
  .warnings {
    background: rgba(212, 167, 42, 0.08);
    border: 1px solid rgba(212, 167, 42, 0.3);
    padding: 10px 14px;
    margin-top: 12px;
    font-size: 12px;
    color: var(--warn);
  }

  /* error banner */
  .error-banner {
    background: rgba(196, 90, 69, 0.12);
    border: 1px solid var(--err);
    color: var(--err);
    padding: 12px 16px;
    margin-top: 12px;
    font-size: 12px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* section labels — small marks next to section titles */
  .idx { font-family: var(--mono); }

  /* hide things we don't need yet but keep accessible */
  .sr { position:absolute; left:-9999px; }
</style>
</head>
<body>

<header class="chrome">
  <div class="brand">
    <span class="logo">Terra</span>
    <span class="tag">Land-Use &amp; GHG Analysis</span>
  </div>
  <span></span>
  <div class="status">
    <div class="pill"><span class="dot" id="dot-backend"></span><span id="lbl-backend">Backend</span></div>
    <div class="pill"><span class="dot" id="dot-device"></span><span id="lbl-device">Device</span></div>
    <div class="pill"><span class="dot" id="dot-agent"></span><span id="lbl-agent">Agent</span></div>
  </div>
</header>

<main>

  <!-- LEFT column: input + measurement -->
  <section class="left">

    <div class="panel" id="panel-input">
      <div class="panel-title"><span>Input</span><span class="idx">01</span></div>
      <div class="panel-body">
        <label for="file" class="drop" id="drop">
          <span class="big">Drop a satellite tile</span>
          <span class="small">PNG or JPG · LoveDA 1024×1024 recommended</span>
          <input type="file" id="file" accept="image/png,image/jpeg" />
        </label>
        <div class="demos">
          <button class="demo" data-demo="3546">Demo · 3546 (forest)</button>
          <button class="demo" data-demo="2523">Demo · 2523 (edge case)</button>
        </div>
      </div>
    </div>

    <div class="panel" id="panel-preview" style="margin-top: 16px;">
      <div class="panel-title"><span>Imagery / Segmentation</span><span class="idx">02</span></div>
      <div class="panel-body">
        <div class="imgs">
          <figure>
            <figcaption>Source</figcaption>
            <div class="frame" id="frame-source">
              <span class="empty">Awaiting input</span>
            </div>
          </figure>
          <figure>
            <figcaption>Predicted classes</figcaption>
            <div class="frame" id="frame-mask">
              <span class="empty">—</span>
            </div>
          </figure>
        </div>
      </div>
    </div>

    <div class="panel" id="panel-composition" style="margin-top: 16px; display: none;">
      <div class="panel-title"><span>Composition</span><span class="idx">03</span></div>
      <div class="panel-body">
        <div class="comp-bar" id="comp-bar"></div>
        <div class="legend" id="legend"></div>
        <div class="totals">
          <div class="kv">
            <div class="k">Total area</div>
            <div class="v" id="kv-area">—<span class="unit">ha</span></div>
          </div>
          <div class="kv">
            <div class="k">Annual flux</div>
            <div class="v" id="kv-annual">—<span class="unit">tCO₂e/yr</span></div>
          </div>
          <div class="kv">
            <div class="k">Embodied stock</div>
            <div class="v" id="kv-embodied">—<span class="unit">tCO₂e</span></div>
          </div>
          <div class="kv">
            <div class="k">Inference</div>
            <div class="v" id="kv-infer">—<span class="unit">ms</span></div>
          </div>
        </div>
        <div id="warnings-host"></div>
        <div class="analyze-row">
          <button class="analyze" id="btn-analyze" disabled>Generate Sustainability Report</button>
        </div>
      </div>
    </div>

  </section>

  <!-- RIGHT column: agent report -->
  <section class="right">
    <div class="panel report-panel" id="panel-report">
      <div class="panel-title"><span>Sustainability Report</span><span class="idx">04</span></div>
      <div id="report-empty" class="report-empty">
        <span class="big">A grounded analysis awaits.</span>
        <span class="small">Upload or select an image. Measure first, then generate.</span>
      </div>
      <div id="report-progress" class="progress" style="display: none;"></div>
      <div id="report-content" class="report-content" style="display: none;"></div>
      <div id="report-meta" class="report-meta" style="display: none;"></div>
    </div>
  </section>

</main>

<script src="app.js"></script>
</body>
</html>
